# Both halves of one split keyboard.
# Right is the central (trackpad side); left is the peripheral.
# The //zmk board variant is required; bare xiao_ble has no ZMK support.
include:
  - board: xiao_ble//zmk
    shield: ergo_left
  - board: xiao_ble//zmk
    shield: ergo_right
    # ZMK Studio talks over USB to the CENTRAL (right) half only.
    # The snippet adds the CDC-ACM RPC endpoint Studio connects to.
    snippet: studio-rpc-usb-uart
  - board: xiao_ble//zmk
    shield: settings_reset
