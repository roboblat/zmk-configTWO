# Applies to BOTH halves (shared, no _left/_right suffix).
# Split + roles are set in the shield's Kconfig.defconfig; these are the
# driver/feature toggles.

CONFIG_ZMK_SPLIT=y

# I2C + MCP23008 column expanders (both halves)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_GPIO_MCP230XX=y

# Encoder (left half)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Pointing / trackpad (central = right). Enabled on both so the shared
# keymap's &mkp bindings compile on each build.
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y
