# Peripheral-only (LEFT half) settings.
#
# The rotary encoder is physically on this half. ZMK's split-encoder docs note
# that for split boards the EC11 enables may need to be in the SPECIFIC half's
# config file, not just the shared one - this is that file. Without the trigger
# thread enabled on the peripheral, left-half rotations are never detected, so
# nothing is relayed to the central. This is the most likely reason rotation
# stopped working.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
